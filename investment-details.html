<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investment Details</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>
<div class="section" id="detail"></div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

(async () => {
  const id = new URLSearchParams(location.search).get('id');
  const { data, error } = await supabase.from('investments').select('*, products(*)').eq('id', id).single();
  if (error || !data) {
    document.getElementById('detail').innerHTML = '<div class="card">Investment not found.</div>';
    return;
  }
  document.getElementById('detail').innerHTML = `
    <div class="card">
      <h2>${data.products?.name || 'Investment'}</h2>
      <p>Invested: ₦${data.amount.toLocaleString()}</p>
      <p>Daily ROI: ₦${data.daily_income.toLocaleString()}</p>
      <p>Earned: ₦${data.total_income.toLocaleString()}</p>
      <p>Status: ${data.status}</p>
      <a href="/investments.html" class="btn btn-outline btn-sm mt-1">Back to Investments</a>
    </div>`;
})();
</script>
</body>
</html>
