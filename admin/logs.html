<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html" class="active">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Activity & Audit Logs</h2>
      <div class="flex gap-2 mb-2">
        <select id="log-type" class="form-select">
          <option value="activity">Activity Logs</option>
          <option value="audit">Audit Logs</option>
        </select>
        <button class="btn btn-primary" onclick="load()">Load</button>
      </div>
      <div id="log-entries"></div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    window.load = async () => {
      const type = document.getElementById('log-type').value;
      const token = await getToken();
      const action = type === 'activity' ? 'activityLogs' : 'auditLogs';
      const res = await fetch(`/api/admin?action=${action}`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      document.getElementById('log-entries').innerHTML = data.map(l => `
        <div class="card mb-1">
          <small>${new Date(l.created_at).toLocaleString()}</small> – 
          <strong>${l.action}</strong>
          ${l.details ? '<pre style="font-size:0.8rem">'+JSON.stringify(l.details, null, 2)+'</pre>' : ''}
        </div>
      `).join('');
    };
    load();
  </script>
</body>
</html>
