<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Roles – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Admin Roles</h2>
      <div class="card mb-2">
        <h4>Promote User to Admin</h4>
        <div class="form-group">
          <input type="text" id="user-id" class="form-input" placeholder="Enter User ID (UUID)">
        </div>
        <button class="btn btn-primary" onclick="promote()">Promote to Admin</button>
      </div>
      <h4>Current Admins</h4>
      <div id="admins-list"></div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    async function apiCall(action, options = {}) {
      const token = await getToken();
      const res = await fetch(`/api/admin?action=${action}`, {
        ...options,
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(options.headers || {}) }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
      return data;
    }

    async function loadAdmins() {
      const data = await apiCall('listAdmins');
      document.getElementById('admins-list').innerHTML = data.map(u => `
        <div class="card mb-1"><strong>${u.full_name || u.email}</strong> (${u.id.slice(0,8)}...)</div>
      `).join('') || 'No admins found';
    }
    window.promote = async () => {
      const userId = document.getElementById('user-id').value.trim();
      if (!userId) return alert('Enter a User ID');
      try {
        await apiCall('promoteAdmin', { method: 'POST', body: JSON.stringify({ user_id: userId }) });
        alert('User promoted to admin');
        loadAdmins();
      } catch (err) {
        alert(err.message);
      }
    };
    loadAdmins();
  </script>
</body>
</html>
