<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Codes – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="gift-codes.html" class="active">Gift Codes</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Gift Codes</h2>
      <div id="form-error" class="alert alert-danger" style="display:none;"></div>
      <form id="gift-form" class="card mb-2">
        <div class="form-group"><input id="code" class="form-input" placeholder="Code (e.g. WELCOME2026)" required></div>
        <div class="form-group"><input id="amount" type="number" min="1" step="0.01" class="form-input" placeholder="Amount (₦)" required></div>
        <div class="form-group"><input id="max_uses" type="number" min="1" class="form-input" placeholder="Max Uses" value="1"></div>
        <button id="submit-btn" class="btn btn-primary">Create Gift Code</button>
      </form>
      <table id="gift-table"><thead><tr><th>Code</th><th>Amount</th><th>Used</th><th>Status</th><th>Actions</th></tr></thead><tbody><tr><td colspan="5">Loading…</td></tr></tbody></table>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient(
      'https://jytmnukzvxirnafukbck.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw'
    );

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    async function getToken() {
      return (await supabase.auth.getSession()).data.session?.access_token;
    }

    async function apiCall(action, options = {}) {
      const token = await getToken();
      const res = await fetch(`/api/admin?action=${action}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
      return data;
    }

    async function load() {
      const tbody = document.querySelector('#gift-table tbody');
      try {
        const data = await apiCall('giftCodesList');
        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5">No gift codes yet.</td></tr>';
          return;
        }
        tbody.innerHTML = data.map(g => `
          <tr>
            <td>${escapeHtml(g.code)}</td>
            <td>₦${Number(g.amount).toLocaleString()}</td>
            <td>${g.current_uses}/${g.max_uses}</td>
            <td>${g.is_active ? '<span class="badge badge-success">Active</span>' : '<span class="badge">Inactive</span>'}</td>
            <td>
              <button class="btn btn-sm ${g.is_active ? 'btn-danger' : 'btn-success'}" data-toggle="${g.id}">
                ${g.is_active ? 'Deactivate' : 'Reactivate'}
              </button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5">Failed to load: ${escapeHtml(err.message)}</td></tr>`;
      }
    }

    document.querySelector('#gift-table tbody').addEventListener('click', async (e) => {
      const id = e.target.dataset.toggle;
      if (!id) return;
      e.target.disabled = true;
      try {
        await apiCall('toggleGiftCode', { method: 'POST', body: JSON.stringify({ id }) });
        load();
      } catch (err) {
        alert(err.message);
        e.target.disabled = false;
      }
    });

    document.getElementById('gift-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating…';

      try {
        await apiCall('createGiftCode', {
          method: 'POST',
          body: JSON.stringify({
            code: document.getElementById('code').value,
            amount: +document.getElementById('amount').value,
            max_uses: +document.getElementById('max_uses').value || 1
          })
        });
        e.target.reset();
        document.getElementById('max_uses').value = 1;
        load();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Gift Code';
      }
    });

    load();
  </script>
</body>
</html>
