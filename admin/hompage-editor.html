<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage Editor – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Homepage Content</h2>
      <div class="card">
        <p>Edit homepage sections as JSON. Keys: hero, about, mission, vision, statistics, testimonials.</p>
        <textarea id="home-json" class="form-textarea" rows="18" style="font-family:monospace;"></textarea>
        <button class="btn btn-primary mt-2" onclick="save()">Save Homepage</button>
      </div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    (async () => {
      const token = await getToken();
      const res = await fetch('/api/admin?action=settingsGet', { headers: { Authorization: `Bearer ${token}` } });
      const s = await res.json();
      const hp = s.find(s => s.key === 'homepage')?.value;
      if (hp) document.getElementById('home-json').value = JSON.stringify(hp, null, 2);
    })();
    window.save = async () => {
      const token = await getToken();
      let obj;
      try { obj = JSON.parse(document.getElementById('home-json').value); } catch (e) { alert('Invalid JSON'); return; }
      await fetch('/api/admin?action=settingsUpdate', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` }, body: JSON.stringify({ key: 'homepage', value: obj }) });
      alert('Homepage saved');
    };
  </script>
</body>
</html>
