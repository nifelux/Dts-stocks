<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Tickets – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html" class="active">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Support Tickets</h2>
      <div id="tickets"></div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    async function load() {
      const token = await getToken();
      const res = await fetch('/api/support?action=listAll', { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      document.getElementById('tickets').innerHTML = data.map(t => `
        <div class="card mb-2">
          <strong>${t.subject}</strong> (${t.status})
          <p>${t.message}</p>
          <textarea id="reply-${t.id}" class="form-textarea mb-1" placeholder="Reply..."></textarea>
          <button class="btn btn-sm btn-primary" onclick="reply('${t.id}')">Reply</button>
        </div>
      `).join('');
    }
    window.reply = async (ticketId) => {
      const token = await getToken();
      const msg = document.getElementById(`reply-${ticketId}`).value;
      await fetch('/api/support?action=adminReply', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ ticket_id: ticketId, message: msg }) });
      load();
    };
    load();
  </script>
</body>
</html>
