<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Codes – DTL Stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section dashboard-page" style="max-width:460px;">
  <div class="page-header">
    <h2>Gift Codes</h2>
    <p class="text-muted" style="margin-bottom:0;">Redeem a code to add funds to your wallet.</p>
  </div>

  <div class="giftcode-hero">
    <span class="giftcode-hero-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8"/><path d="M16.5 8a2.5 2.5 0 0 0 0-5C13 3 12 8 12 8"/></svg>
    </span>
    <h3>Have a gift code?</h3>
    <p>Enter it below to instantly credit your wallet.</p>
  </div>

  <div class="giftcode-voucher">
    <form id="redeem-form">
      <div class="form-group" style="margin-bottom:0.9rem;">
        <label class="form-label">Gift Code</label>
        <input type="text" id="code" class="form-input giftcode-input" placeholder="XXXX-XXXX" required autocomplete="off">
      </div>
      <button class="btn btn-primary btn-block" id="redeem-btn">Redeem</button>
    </form>
    <div id="result" class="mt-2"></div>
  </div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

document.getElementById('redeem-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const code = document.getElementById('code').value.trim();
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return (window.location.href = 'login.html');

  const btn = document.getElementById('redeem-btn');
  btn.disabled = true;
  btn.textContent = 'Redeeming…';

  const { data, error } = await supabase.rpc('redeem_gift_code', { p_code: code, p_user_id: user.id });

  btn.disabled = false;
  btn.textContent = 'Redeem';

  if (error) {
    document.getElementById('result').innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
    return;
  }

  document.getElementById('result').innerHTML = data.success
    ? `<div class="alert alert-success">Successfully redeemed ₦${data.amount.toLocaleString()}!</div>`
    : `<div class="alert alert-danger">${data.message}</div>`;

  if (data.success) document.getElementById('redeem-form').reset();
});
</script>
</body>
  </html>
