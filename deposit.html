<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit – DTL Stocks</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section" style="max-width:600px; margin:auto;">
  <h2>Deposit Funds</h2>
  <p>Transfer the exact amount to the bank details below, then upload proof.</p>

  <div class="card mb-2" style="background:#fef9c3;">
    <strong>Bank Name: </strong>Access Bank<br>
    <strong>Account Number: </strong>1234567890<br>
    <strong>Account Name: </strong>DTL Stocks Ltd
  </div>

  <div id="error-alert" class="alert alert-danger" style="display:none;"></div>

  <form id="deposit-form">
    <div class="form-group">
      <label class="form-label">Amount (₦)</label>
      <input type="number" id="amount" class="form-input" required min="1000">
    </div>
    <div class="form-group">
      <label class="form-label">Payment Method</label>
      <select id="method" class="form-select"><option>Bank Transfer</option><option>USDT</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">Proof Screenshot</label>
      <input type="file" id="proof-file" accept="image/*" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="deposit-submit-btn">Submit Deposit</button>
  </form>

  <h3 class="mt-3">Recent Deposits</h3>
  <div id="deposits-list">Loading…</div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://jytmnukzvxirnafukbck.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw'
);

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

async function checkAuth() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) window.location.href = 'login.html';
  return user;
}

function showError(msg) {
  const el = document.getElementById('error-alert');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearError() {
  const el = document.getElementById('error-alert');
  el.style.display = 'none';
}

async function uploadFile(file) {
  const fileName = `${Date.now()}_${file.name}`;
  const { data, error } = await supabase.storage.from('proofs').upload(fileName, file);
  if (error) throw error;
  const { data: { publicUrl } } = supabase.storage.from('proofs').getPublicUrl(data.path);
  return publicUrl;
}

function statusBadge(status) {
  const map = { approved: 'badge-success', pending: 'badge-warning', rejected: 'badge-danger' };
  return `<span class="badge ${map[status] || ''}">${status}</span>`;
}

async function loadDeposits(user) {
  const { data } = await supabase
    .from('deposits')
    .select('*')
    .eq('user_id', user.id)
    .order('created_at', { ascending: false })
    .limit(10);
  document.getElementById('deposits-list').innerHTML = data?.map(d => `
    <div class="txn-row">
      <span class="currency-ngn">${d.amount.toLocaleString()}</span>
      ${statusBadge(d.status)}
      <span class="text-muted" style="font-size:0.8rem;">${new Date(d.created_at).toLocaleDateString()}</span>
    </div>`).join('') || '<p class="text-muted">No deposits yet.</p>';
}

document.getElementById('deposit-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();

  const user = await checkAuth();
  if (!user) return;

  const amount = +document.getElementById('amount').value;
  const method = document.getElementById('method').value;
  const file = document.getElementById('proof-file').files[0];
  if (!file) return showError('Please upload your proof of payment.');
  if (!amount || amount < 1000) return showError('Minimum deposit is ₦1,000.');

  const btn = document.getElementById('deposit-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const proofUrl = await uploadFile(file);
    const { error } = await supabase.from('deposits').insert({
      user_id: user.id, amount, payment_method: method, proof_image_url: proofUrl
    });
    if (error) { showError(error.message); return; }
    alert('Deposit submitted for approval!');
    location.reload();
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Deposit';
  }
});

checkAuth().then(user => { if (user) loadDeposits(user); });
</script>
</body>
</html>
