<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings – DTL Stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section dashboard-page" style="max-width:460px;">
  <div class="page-header">
    <h2>Settings</h2>
    <p class="text-muted" style="margin-bottom:0;">Manage your account security.</p>
  </div>

  <div class="settings-section-label">Security</div>
  <div class="card">
    <div class="flex items-center gap-2 mb-2">
      <span class="settings-row-icon" style="background:#FFF3D6;color:var(--clr-yellow-deep);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <div>
        <strong style="display:block;">Change Password</strong>
        <span class="text-muted" style="font-size:0.82rem;">Use at least 8 characters.</span>
      </div>
    </div>
    <form id="pwd-form">
      <div class="form-group" style="margin-bottom:0.9rem;">
        <label class="form-label">New Password</label>
        <input type="password" id="password" class="form-input" minlength="8" required>
      </div>
      <button class="btn btn-primary btn-block">Update Password</button>
    </form>
  </div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

document.getElementById('pwd-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  const { error } = await supabase.auth.updateUser({ password: document.getElementById('password').value });

  btn.disabled = false;
  btn.textContent = 'Update Password';

  if (error) return alert(error.message);
  alert('Password updated');
  e.target.reset();
});
</script>
</body>
</html>
