<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYC – DTL Stocks</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo"><strong>DTL Stocks</strong></div>
    <ul class="nav-links"><li><a href="dashboard.html">Dashboard</a></li><li><a href="kyc.html" class="active">KYC</a></li></ul>
  </nav>

  <div class="section" style="max-width:500px; margin:auto;">
    <h2>Verify Identity (KYC)</h2>
    <form id="kyc-form">
      <div class="form-group">
        <label>Document Type</label>
        <select id="doc_type" class="form-select">
          <option value="id_front">ID Card (Front)</option>
          <option value="id_back">ID Card (Back)</option>
          <option value="selfie">Selfie</option>
          <option value="address_proof">Proof of Address</option>
        </select>
      </div>
      <div class="form-group">
        <label>Upload Image</label>
        <input type="file" id="file" accept="image/*" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Submit</button>
    </form>
    <h3 class="mt-3">Submitted Documents</h3>
    <div id="docs-list"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

    document.getElementById('kyc-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = (await supabase.auth.getUser()).data.user;
      const file = document.getElementById('file').files[0];
      const docType = document.getElementById('doc_type').value;
      const fileName = `${Date.now()}_${file.name}`;
      const { data: upload } = await supabase.storage.from('kyc').upload(fileName, file);
      const { data: { publicUrl } } = supabase.storage.from('kyc').getPublicUrl(upload.path);
      await supabase.from('kyc_documents').insert({ user_id: user.id, doc_type: docType, image_url: publicUrl });
      alert('Document uploaded!');
      location.reload();
    });

    async function loadDocs() {
      const user = (await supabase.auth.getUser()).data.user;
      const { data } = await supabase.from('kyc_documents').select('*').eq('user_id', user.id);
      document.getElementById('docs-list').innerHTML = data?.map(d => `<div class="card mb-1">${d.doc_type} – <span class="badge">${d.status}</span></div>`).join('') || 'No documents';
    }
    loadDocs();
  </script>
</body>
</html>
