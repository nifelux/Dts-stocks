<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>VIP Levels</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body><nav class="navbar"><div class="logo">DTL Stocks</div></nav><div class="section"><h2>VIP Program</h2><div class="grid-3" id="vip"></div></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
(async()=>{const {data}=await supabase.from('vip_levels').select('*');document.getElementById('vip').innerHTML=data?.map(v=>`<div class="card"><h3>${v.level}</h3><p>Min Deposit: ₦${v.min_deposit.toLocaleString()}</p></div>`).join('');})();
</script></body></html>
